<svg xmlns="http://www.w3.org/2000/svg" width="580" height="325" viewBox="0 0 580 325">

  <!-- Terminal background -->
  <rect width="580" height="325" rx="10" fill="#0d1117"/>

  <!-- Title bar -->
  <rect width="580" height="36" rx="10" fill="#161b22"/>
  <rect y="26" width="580" height="10" fill="#161b22"/>

  <!-- Traffic lights -->
  <circle cx="20" cy="18" r="5.5" fill="#ff5f57"/>
  <circle cx="39" cy="18" r="5.5" fill="#febc2e"/>
  <circle cx="58" cy="18" r="5.5" fill="#28c840"/>

  <!-- Window title -->
  <text x="290" y="23" font-family="ui-monospace,monospace" font-size="11" fill="#6e7681" text-anchor="middle">bash — henrique@dev</text>

  <!-- ❯ whoami — t=0.5s -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.015;0.040;0.820;0.920;1" dur="20s" repeatCount="indefinite"/>
    <text x="24" y="60" font-family="ui-monospace,monospace" font-size="13" fill="#22c55e">❯</text>
    <text x="40" y="60" font-family="ui-monospace,monospace" font-size="13" fill="#e2e8f0">whoami</text>
  </g>

  <!-- henrique_christ — t=1.2s -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.050;0.075;0.820;0.920;1" dur="20s" repeatCount="indefinite"/>
    <text x="40" y="77" font-family="ui-monospace,monospace" font-size="13" fill="#6e7681">henrique_christ</text>
  </g>

  <!-- ❯ uptime — t=2.3s -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.105;0.130;0.820;0.920;1" dur="20s" repeatCount="indefinite"/>
    <text x="24" y="99" font-family="ui-monospace,monospace" font-size="13" fill="#22c55e">❯</text>
    <text x="40" y="99" font-family="ui-monospace,monospace" font-size="13" fill="#e2e8f0">uptime</text>
  </g>

  <!-- 4 years... — t=3.1s -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.145;0.170;0.820;0.920;1" dur="20s" repeatCount="indefinite"/>
    <text x="40" y="116" font-family="ui-monospace,monospace" font-size="13" fill="#6e7681">4 years, degraded performance, memory leaks detected</text>
  </g>

  <!-- ❯ ssh henrique@dev — t=4.2s -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.200;0.225;0.820;0.920;1" dur="20s" repeatCount="indefinite"/>
    <text x="24" y="138" font-family="ui-monospace,monospace" font-size="13" fill="#22c55e">❯</text>
    <text x="40" y="138" font-family="ui-monospace,monospace" font-size="13" fill="#e2e8f0">ssh henrique@dev</text>
  </g>

  <!-- Welcome. — t=5.0s -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.240;0.265;0.820;0.920;1" dur="20s" repeatCount="indefinite"/>
    <text x="40" y="155" font-family="ui-monospace,monospace" font-size="13" fill="#6e7681">Welcome. Grab some coffee and let's go!</text>
  </g>

  <!-- Status: — t=5.8s -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.280;0.305;0.820;0.920;1" dur="20s" repeatCount="indefinite"/>
    <text x="40" y="172" font-family="ui-monospace,monospace" font-size="13" fill="#6e7681">Status: building your dreams...</text>
  </g>

  <!-- Error: — t=6.6s -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.320;0.345;0.820;0.920;1" dur="20s" repeatCount="indefinite"/>
    <text x="40" y="189" font-family="ui-monospace,monospace" font-size="13">
      <tspan fill="#ef4444">Error:</tspan>
      <tspan fill="#6e7681"> missing dependency 'sleep'</tspan>
    </text>
  </g>

  <!-- ❯ git log --oneline -2 — t=7.7s -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.375;0.400;0.820;0.920;1" dur="20s" repeatCount="indefinite"/>
    <text x="24" y="211" font-family="ui-monospace,monospace" font-size="13" fill="#22c55e">❯</text>
    <text x="40" y="211" font-family="ui-monospace,monospace" font-size="13" fill="#e2e8f0">git log --oneline -2</text>
  </g>

  <!-- a3f92d1 feat: — t=8.5s -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.415;0.440;0.820;0.920;1" dur="20s" repeatCount="indefinite"/>
    <text x="40" y="228" font-family="ui-monospace,monospace" font-size="13">
      <tspan fill="#6e7681">a3f92d1 </tspan>
      <tspan fill="#22c55e">feat:</tspan>
      <tspan fill="#6e7681"> built something awesome today</tspan>
    </text>
  </g>

  <!-- 7b21c9e fix: — t=9.3s -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.455;0.480;0.820;0.920;1" dur="20s" repeatCount="indefinite"/>
    <text x="40" y="245" font-family="ui-monospace,monospace" font-size="13">
      <tspan fill="#6e7681">7b21c9e </tspan>
      <tspan fill="#f59e0b">fix:</tspan>
      <tspan fill="#6e7681"> broke everything else</tspan>
    </text>
  </g>

  <!-- ❯ git push origin life — t=10.4s -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.510;0.535;0.820;0.920;1" dur="20s" repeatCount="indefinite"/>
    <text x="24" y="267" font-family="ui-monospace,monospace" font-size="13" fill="#22c55e">❯</text>
    <text x="40" y="267" font-family="ui-monospace,monospace" font-size="13" fill="#e2e8f0">git push origin life</text>
  </g>

  <!-- CONFLICT — t=11.2s -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.550;0.575;0.820;0.920;1" dur="20s" repeatCount="indefinite"/>
    <text x="40" y="284" font-family="ui-monospace,monospace" font-size="13">
      <tspan fill="#ef4444">CONFLICT (existential):</tspan>
      <tspan fill="#6e7681"> merge failed</tspan>
    </text>
  </g>

  <!-- ❯ prompt final — t=12.2s -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.600;0.615;0.820;0.920;1" dur="20s" repeatCount="indefinite"/>
    <text x="24" y="306" font-family="ui-monospace,monospace" font-size="13" fill="#22c55e">❯</text>
  </g>

  <!-- cursor blink t=12.2s → t=15.7s -->
  <rect x="40" y="293" width="7.8" height="14" fill="#22c55e" opacity="0">
    <animate attributeName="opacity"
      values="0;0;1;0;1;0;1;0;1;0;0;0"
      keyTimes="0;0.600;0.610;0.635;0.660;0.685;0.710;0.735;0.760;0.785;0.820;1"
      dur="20s" repeatCount="indefinite"/>
  </rect>

</svg>
